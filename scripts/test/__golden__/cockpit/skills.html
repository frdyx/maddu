<section aria-live="polite" class="stage-body fade-in" id="route-view">
  <div class="view">
    <h2>
      "Skills"
    </h2>
    <p>
      "Reusable recipes distilled from slice-stops. SKILL.md format under .maddu/skills/."
    </p>
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">
          "Summary"
        </span>
        <span class="panel-aside">
          "gallery composition · tags · provenance"
        </span>
      </div>
      <div>
        <div class="empty-state">
          <div aria-hidden="true" class="empty-state-glyph">
            "◌"
          </div>
          <div class="empty-state-title">
            "No skills"
          </div>
          <div class="empty-state-hint">
            "Distill a slice-stop into a skill to populate the gallery."
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <input placeholder="Skill title…" style="flex:2;background:var(--m-bg-2);color:var(--m-fg-0);border:1px solid var(--m-line);padding:6px 10px;font-family:var(--m-font-mono);font-size:12px;" type="text">
      <input placeholder="when (one line)…" style="flex:2;background:var(--m-bg-2);color:var(--m-fg-0);border:1px solid var(--m-line);padding:6px 10px;font-family:var(--m-font-mono);font-size:12px;" type="text">
      <input placeholder="tags (comma)" style="flex:1;background:var(--m-bg-2);color:var(--m-fg-0);border:1px solid var(--m-line);padding:6px 10px;font-family:var(--m-font-mono);font-size:12px;" type="text">
      <button>
        "Create"
      </button>
    </div>
    <div style="display:grid;grid-template-columns:340px 1fr;gap:12px;align-items:start;">
      <div>
        <div class="empty-state">
          <div aria-hidden="true" class="empty-state-glyph">
            "◌"
          </div>
          <div class="empty-state-title">
            "No skills yet"
          </div>
          <div class="empty-state-hint">
            "Create one above or run `maddu skill from-slice <eventId>`."
          </div>
        </div>
      </div>
      <div>
    </div>
  </div>
</section>
