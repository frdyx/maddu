<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Máddu — the Source of local truth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
<link rel="stylesheet" href="/cockpit.css">
</head>
<body>
  <div id="app" aria-busy="true">
    <aside class="rail">
      <div class="rail-mark">
        <span class="rail-mark-glyph">◈</span>
        <span class="rail-mark-name">Máddu</span>
      </div>
      <nav class="rail-nav" aria-label="Cockpit routes">
        <a href="#/workbench"  class="rail-link" data-route="workbench"><span class="rail-link-glyph">◆</span><span>Workbench</span></a>
        <a href="#/dashboard"  class="rail-link" data-route="dashboard"><span class="rail-link-glyph">◇</span><span>Dashboard</span></a>
        <a href="#/approvals"  class="rail-link" data-route="approvals"><span class="rail-link-glyph">◇</span><span>Approvals</span><span class="rail-link-badge" id="approvals-badge" hidden>0</span></a>
        <a href="#/events"     class="rail-link" data-route="events"><span class="rail-link-glyph">◇</span><span>Events</span></a>
        <a href="#/mailbox"    class="rail-link" data-route="mailbox"><span class="rail-link-glyph">◇</span><span>Mailbox</span><span class="rail-link-badge" id="mailbox-badge" hidden>0</span></a>
        <a href="#/tasks"      class="rail-link" data-route="tasks"><span class="rail-link-glyph">◇</span><span>Tasks</span><span class="rail-link-badge" id="tasks-badge" hidden>0</span></a>
        <a href="#/skills"     class="rail-link" data-route="skills"><span class="rail-link-glyph">◇</span><span>Skills</span></a>
        <a href="#/search"     class="rail-link" data-route="search"><span class="rail-link-glyph">◇</span><span>Search</span></a>
        <a href="#/runtimes"   class="rail-link" data-route="runtimes"><span class="rail-link-glyph">◇</span><span>Runtimes</span></a>
        <a href="#/mcp"        class="rail-link" data-route="mcp"><span class="rail-link-glyph">◇</span><span>MCP</span></a>
        <a href="#/schedule"   class="rail-link" data-route="schedule"><span class="rail-link-glyph">◇</span><span>Schedule</span></a>
        <a href="#/auth"       class="rail-link" data-route="auth"><span class="rail-link-glyph">◇</span><span>Auth</span></a>
        <a href="#/imports"    class="rail-link" data-route="imports"><span class="rail-link-glyph">◇</span><span>Imports</span></a>
        <a href="#/operations" class="rail-link" data-route="operations"><span class="rail-link-glyph">◇</span><span>Operations</span></a>
        <a href="#/swarm"      class="rail-link" data-route="swarm"><span class="rail-link-glyph">◇</span><span>Swarm</span></a>
        <a href="#/chats"      class="rail-link" data-route="chats"><span class="rail-link-glyph">◇</span><span>Chats</span></a>
        <a href="#/roadmap"    class="rail-link" data-route="roadmap"><span class="rail-link-glyph">◇</span><span>Roadmap</span></a>
        <a href="#/settings"   class="rail-link" data-route="settings"><span class="rail-link-glyph">◇</span><span>Settings</span></a>
      </nav>
      <div class="rail-foot">
        <div class="rail-foot-row"><span class="rail-foot-label">Bridge</span><span class="rail-foot-value" id="status-bridge">…</span></div>
        <div class="rail-foot-row"><span class="rail-foot-label">Version</span><span class="rail-foot-value" id="status-version">…</span></div>
        <div class="rail-foot-row"><span class="rail-foot-label">Uptime</span><span class="rail-foot-value" id="status-uptime">…</span></div>
      </div>
    </aside>

    <main class="stage">
      <header class="stage-head">
        <div class="stage-head-route">
          <span class="stage-head-glyph">◈</span>
          <span class="stage-head-title" id="route-title">Dashboard</span>
        </div>
        <div class="stage-head-meta" id="route-meta"></div>
      </header>
      <div class="stage-banner" id="stuck-banner" hidden></div>
      <section class="stage-body" id="route-view" aria-live="polite"></section>
      <footer class="stage-foot">
        <div class="composer">
          <span class="composer-glyph">▸</span>
          <textarea id="composer-input" class="composer-input" rows="1" autocomplete="off" spellcheck="false"
                    placeholder="/ to issue a slash-command  ·  /help for the list  ·  Shift+Enter for newline"></textarea>
          <span class="composer-hint" id="composer-hint"></span>
          <div class="composer-suggest" id="composer-suggest" hidden></div>
          <div class="composer-toast" id="composer-toast" hidden></div>
        </div>
        <div class="stage-foot-meta">
          <span class="stage-foot-tagline">The Source of local truth.</span>
          <span class="stage-foot-coord"><span id="status-host">127.0.0.1</span>:<span id="status-port">4177</span></span>
        </div>
      </footer>
    </main>
  </div>

  <script type="module" src="/cockpit.js"></script>
</body>
</html>
