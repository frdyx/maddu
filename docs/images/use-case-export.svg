<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 380" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Governed experience data — the redaction-gated export for training pipelines and audits">
  <title>Governed experience data</title>
  <desc>The spine derives an experience ledger; a mandatory refuse-on-hit secret gate guards the export; the artifact ships trainingEligibility false until the operator judges otherwise; OTel logs feed existing observability.</desc>
  <defs>
    <style>
      .canvas    { fill: #FFFFFF; }
      .node      { fill: #F8FAFD; stroke: #8298B0; stroke-width: 1.2; }
      .node.blue { fill: #EAF5FF; stroke: #2489DB; }
      .node.lime { fill: #F4FFC8; stroke: #A9CC00; }
      .node.warn { fill: #FFF6E5; stroke: #D99A2B; }
      .node.bad  { fill: #FFEDF1; stroke: #E0355A; }
      .edge      { fill: none; stroke: #7D93AC; stroke-width: 1.5; }
      .edge.live { stroke: #8FB800; stroke-width: 2; }
      .edge.bad  { stroke: #E0355A; stroke-width: 1.5; stroke-dasharray: 5 6; }
      .cond-b    { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; font-weight: 600; letter-spacing: 0.06em; }
      .mono      { font-family: 'IBM Plex Mono','JetBrains Mono','Consolas',monospace; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7D93AC"/>
    </marker>
    <marker id="arr-lime" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8FB800"/>
    </marker>
    <marker id="arr-bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E0355A"/>
    </marker>
  </defs>

  <rect class="canvas" width="1480" height="380"/>

  <g transform="translate(40,34)">
    <text x="0" y="0" class="cond-b" fill="#6C8A00" font-size="11" letter-spacing="0.14em">◈ USE CASE 06 · EXPORT</text>
    <text x="0" y="22" class="cond-b" fill="#06121F" font-size="20">Your trajectories leave on your terms — or not at all</text>
    <text x="0" y="42" class="mono" fill="#5C6B7E" font-size="11">deterministic bytes · byte-identical re-runs ARE the audit trail</text>
  </g>

  <!-- main flow -->
  <rect class="node blue" x="40" y="170" width="170" height="64" rx="6"/>
  <text x="56" y="196" class="cond-b" fill="#1B6FBE" font-size="14">spine</text>
  <text x="56" y="217" class="mono" fill="#5C6B7E" font-size="11">the verified record</text>

  <path d="M 210 202 L 280 202" class="edge" marker-end="url(#arr)"/>

  <rect class="node" x="286" y="170" width="270" height="64" rx="6"/>
  <text x="302" y="196" class="cond-b" fill="#06121F" font-size="14">experience ledger</text>
  <text x="302" y="217" class="mono" fill="#5C6B7E" font-size="11">trajectories · steps · signals</text>

  <path d="M 556 202 L 626 202" class="edge" marker-end="url(#arr)"/>

  <rect class="node warn" x="632" y="160" width="250" height="84" rx="6"/>
  <text x="648" y="188" class="cond-b" fill="#A06E12" font-size="14">🔒 secret gate</text>
  <text x="648" y="209" class="mono" fill="#5C6B7E" font-size="11">refuse-on-hit</text>
  <text x="648" y="227" class="mono" fill="#A06E12" font-size="11">no skip flag exists</text>

  <!-- clean → artifact -->
  <path d="M 882 188 C 950 188, 950 172, 1010 172" class="edge live" marker-end="url(#arr-lime)"/>
  <text x="920" y="162" class="mono" fill="#5C6B7E" font-size="11">clean</text>
  <rect class="node lime" x="1016" y="140" width="270" height="64" rx="6"/>
  <text x="1032" y="164" class="cond-b" fill="#5F7A00" font-size="14">deterministic artifact</text>
  <text x="1032" y="185" class="mono" fill="#06121F" font-size="11">trainingEligibility: false</text>

  <!-- hit → refused -->
  <path d="M 882 220 C 950 220, 950 300, 1010 300" class="edge bad" marker-end="url(#arr-bad)"/>
  <text x="920" y="272" class="mono" fill="#C22B4E" font-size="11">hit</text>
  <rect class="node bad" x="1016" y="272" width="270" height="56" rx="6"/>
  <text x="1032" y="295" class="cond-b" fill="#C22B4E" font-size="14">refused</text>
  <text x="1032" y="315" class="mono" fill="#5C6B7E" font-size="11">offending event ids named</text>

  <!-- artifact → curation pipeline (operator judgment) -->
  <rect class="node" x="1016" y="30" width="270" height="56" rx="6"/>
  <text x="1032" y="53" class="cond-b" fill="#06121F" font-size="13">your curation / fine-tuning pipeline</text>
  <text x="1032" y="73" class="mono" fill="#5C6B7E" font-size="11">ADP-style corpora · SFT / DPO</text>
  <path d="M 1151 140 L 1151 92" class="edge" marker-end="url(#arr)"/>
  <text x="1170" y="112" class="mono" fill="#5C6B7E" font-size="11">operator judgment, never a default</text>

  <!-- otel side output -->
  <path d="M 125 234 C 125 328, 200 328, 280 328" class="edge" marker-end="url(#arr)"/>
  <rect class="node blue" x="286" y="300" width="270" height="56" rx="6"/>
  <text x="302" y="323" class="cond-b" fill="#1B6FBE" font-size="13">OTel logs</text>
  <text x="302" y="343" class="mono" fill="#5C6B7E" font-size="11">→ the observability stack you already run</text>
</svg>
