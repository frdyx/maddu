<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 600" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Máddu slice lifecycle">
  <title>The slice loop — register → claim → work → slice-stop → hindsight → memory / skills · review / follow-up · janitor / re-register</title>
  <desc>The Máddu work loop: a session registers (idempotent on MADDU_SESSION_ID), claims a lane, does the work, heartbeats, runs slice-stop. The slice-stop event feeds hindsight extraction into memory and skills, optionally fires a post-stop review, and either closes the session or — via the janitor — auto-closes a stale session and surfaces a follow-up.</desc>
  <defs>
    <style>
      .canvas    { fill: #050B17; }
      .node-rect { fill: #0A1224; stroke: #D0FF00; stroke-width: 1.2; }
      .node-rect.boss   { stroke: #56B8FF; }
      .node-rect.warm   { stroke: #F2BD5C; }
      .edge      { fill: none; stroke: rgba(80,113,149,0.55); stroke-width: 1.5; opacity: 0.85; }
      .edge.live { stroke: #D0FF00; stroke-width: 2; opacity: 0.75; }
      .edge.warm { stroke: #F2BD5C; stroke-width: 1.6; opacity: 0.7; stroke-dasharray: 4 3; }
      .cond-b    { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; font-weight: 600; letter-spacing: 0.06em; }
      .mono      { font-family: 'IBM Plex Mono','JetBrains Mono','Consolas',monospace; }
    </style>
    <filter id="glow-lime" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect class="canvas" width="1480" height="600"/>

  <!-- Title strip -->
  <g transform="translate(40,30)">
    <text x="0" y="0" class="cond-b" fill="#D0FF00" font-size="11" letter-spacing="0.14em" filter="url(#glow-lime)">◈ LIFECYCLE</text>
    <text x="0" y="22" class="cond-b" fill="#E8E6E3" font-size="20">The slice loop</text>
    <text x="0" y="42" class="mono" fill="#6a7079" font-size="11">register → claim → work → slice-stop → hindsight → memory / skills · review / follow-up · janitor / re-register</text>
  </g>

  <!-- Bezier edges — main loop (left to right, then down through hindsight) -->
  <g>
    <!-- register → claim -->
    <path d="M 220 200 C 290 200, 290 200, 360 200" class="edge live"/>
    <!-- claim → work -->
    <path d="M 420 240 C 420 280, 420 310, 420 350" class="edge live"/>
    <!-- work → slice-stop -->
    <path d="M 480 380 C 540 380, 600 380, 660 380" class="edge live"/>
    <!-- slice-stop → hindsight -->
    <path d="M 780 380 C 840 380, 900 380, 960 380" class="edge live"/>
    <!-- hindsight → memory/skills -->
    <path d="M 1080 380 C 1140 380, 1200 380, 1260 380" class="edge live"/>

    <!-- memory/skills → register (feedback loop, top arc) -->
    <path d="M 1320 360 C 1320 100, 760 60, 160 180" class="edge"/>

    <!-- slice-stop → review (v0.16) -->
    <path d="M 720 410 C 720 470, 1180 470, 1300 240" class="edge"/>
    <!-- review → claim (follow-up loop) -->
    <path d="M 1300 220 C 900 180, 700 220, 420 200" class="edge warm"/>

    <!-- janitor → register (auto-close cleanup, dashed amber) -->
    <path d="M 100 130 C 100 100, 100 100, 160 180" class="edge warm"/>
  </g>

  <!-- Nodes -->
  <g class="cond-b" font-size="13" text-anchor="middle">
    <!-- register — turn-start primitive, glow lime -->
    <g transform="translate(100,178)">
      <rect class="node-rect" width="120" height="44" rx="6" filter="url(#glow-lime)"/>
      <text x="60" y="28" fill="#D0FF00">REGISTER</text>
    </g>

    <!-- claim -->
    <g transform="translate(360,178)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28" fill="#E8E6E3">CLAIM</text>
    </g>

    <!-- work -->
    <g transform="translate(360,350)">
      <rect class="node-rect" width="120" height="60" rx="6"/>
      <text x="60" y="26" fill="#E8E6E3">WORK</text>
      <text x="60" y="46" class="mono" font-size="10" fill="#6a7079">heartbeats</text>
    </g>

    <!-- slice-stop -->
    <g transform="translate(660,358)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28" fill="#E8E6E3">SLICE-STOP</text>
    </g>

    <!-- hindsight -->
    <g transform="translate(960,358)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28" fill="#E8E6E3">HINDSIGHT</text>
    </g>

    <!-- memory + skills — terminal value surface, glow lime -->
    <g transform="translate(1260,358)">
      <rect class="node-rect" width="160" height="44" rx="6" filter="url(#glow-lime)"/>
      <text x="80" y="28" fill="#D0FF00">MEMORY · SKILLS</text>
    </g>

    <!-- review (v0.16) — second-opinion lane, glow cyan -->
    <g transform="translate(1260,198)">
      <rect class="node-rect boss" width="160" height="44" rx="6" filter="url(#glow-cyan)"/>
      <text x="80" y="28" fill="#56B8FF">REVIEW</text>
    </g>

    <!-- janitor (v0.17) -->
    <g transform="translate(40,108)">
      <rect class="node-rect warm" width="120" height="44" rx="6"/>
      <text x="60" y="28" fill="#F2BD5C">JANITOR</text>
    </g>
  </g>

  <!-- Annotations — small mono notes -->
  <g class="mono" font-size="10" letter-spacing="0.04em" fill="#6a7079">
    <text x="160" y="252" text-anchor="middle">idempotent · $MADDU_SESSION_ID</text>
    <text x="870" y="368" text-anchor="middle">extracts facts</text>
    <text x="1170" y="368" text-anchor="middle">writes memory.ndjson</text>
    <text x="1010" y="475" text-anchor="middle">non-clean → FOLLOWUP_OPENED</text>
    <text x="780" y="200" text-anchor="middle">re-claim on follow-up</text>
    <text x="100" y="92" text-anchor="middle">30-min stale → 4-hr auto-close</text>
  </g>

  <!-- Legend strip -->
  <g transform="translate(40,490)">
    <text x="0" y="0" class="cond-b" fill="#6a7079" font-size="10" letter-spacing="0.10em">LEGEND</text>
    <line x1="0" y1="20" x2="640" y2="20" stroke="rgba(80,113,149,0.18)" stroke-width="1"/>
    <g transform="translate(0,40)">
      <rect width="14" height="2" fill="#D0FF00"/>
      <text x="22" y="6" class="mono" fill="#6a7079" font-size="11">primary loop (live)</text>
    </g>
    <g transform="translate(180,40)">
      <rect width="14" height="2" fill="rgba(80,113,149,0.55)"/>
      <text x="22" y="6" class="mono" fill="#6a7079" font-size="11">feedback / branch</text>
    </g>
    <g transform="translate(360,40)">
      <rect width="14" height="2" fill="#F2BD5C"/>
      <text x="22" y="6" class="mono" fill="#6a7079" font-size="11">v0.17 surface (dashed)</text>
    </g>
  </g>

  <!-- Tagline -->
  <g transform="translate(740,570)">
    <text x="0" y="0" class="mono" fill="#6a7079" font-size="10" text-anchor="middle" letter-spacing="0.08em">ONE SLICE · ONE STOP · EVERY ACTION DESCENDS FROM A RECORDED ANCESTOR</text>
  </g>
</svg>
