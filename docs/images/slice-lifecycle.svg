<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" role="img" aria-label="Máddu slice lifecycle">
  <title>The slice loop — register → claim → work → slice-stop → hindsight → memory / skills · review / follow-up · janitor / re-register</title>
  <desc>The Máddu work loop: a session registers (idempotent on MADDU_SESSION_ID), claims a lane, does the work, heartbeats, runs slice-stop. The slice-stop event feeds hindsight extraction into memory and skills, optionally fires a post-stop review, and either closes the session or — via the janitor — auto-closes a stale session and surfaces a follow-up.</desc>
  <defs>
    <style>
      .canvas    { fill: #050B17; }
      .panel     { fill: #0C1428; stroke: rgba(80,113,149,0.30); stroke-width: 1; }
      .node-rect { fill: #0A1224; stroke: #D0FF00; stroke-width: 1.2; }
      .node-rect.boss   { stroke: #56B8FF; }
      .node-rect.warm   { stroke: #F2BD5C; }
      .edge      { fill: none; stroke: rgba(80,113,149,0.55); stroke-width: 1.5; opacity: 0.85; }
      .edge.live { stroke: #D0FF00; stroke-width: 2; opacity: 0.75; }
      .edge.warm { stroke: #F2BD5C; stroke-width: 1.8; opacity: 0.75; }
      .fg-0      { fill: #E8E6E3; }
      .fg-2      { fill: #9aa1ab; }
      .fg-3      { fill: #6a7079; }
      .accent    { fill: #D0FF00; }
      .accent2   { fill: #56B8FF; }
      .warm      { fill: #F2BD5C; }
      .cond-b    { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; font-weight: 600; letter-spacing: 0.06em; }
      .mono      { font-family: 'IBM Plex Mono','JetBrains Mono','Consolas',monospace; }
    </style>
  </defs>

  <rect class="canvas" width="1400" height="560"/>

  <!-- Title strip -->
  <g transform="translate(40,30)">
    <text x="0" y="0" class="cond-b accent" font-size="11" letter-spacing="0.14em">◈ LIFECYCLE</text>
    <text x="0" y="22" class="cond-b fg-0" font-size="20">The slice loop</text>
    <text x="0" y="42" class="mono fg-3" font-size="11">register → claim → work → slice-stop → hindsight → memory / skills · review / follow-up · janitor / re-register</text>
  </g>

  <!-- Bezier edges — main loop -->
  <g>
    <!-- register → claim -->
    <path d="M 220 150 C 320 150, 320 150, 420 150" class="edge live"/>
    <!-- claim → work -->
    <path d="M 480 180 C 480 220, 480 250, 480 290" class="edge live"/>
    <!-- work → heartbeat (small loop on work) -->
    <path d="M 540 310 C 600 310, 600 310, 600 310" class="edge"/>
    <!-- work → slice-stop -->
    <path d="M 480 350 C 480 390, 480 430, 480 470" class="edge live"/>
    <!-- slice-stop → hindsight -->
    <path d="M 540 490 C 660 490, 660 490, 780 490" class="edge live"/>
    <!-- hindsight → memory/skills -->
    <path d="M 900 490 C 1020 490, 1020 490, 1140 490" class="edge live"/>
    <!-- memory/skills → register (feedback loop, top arc) -->
    <path d="M 1200 470 C 1200 200, 700 80, 220 130" class="edge"/>

    <!-- slice-stop → review (v0.16) -->
    <path d="M 460 510 C 460 540, 800 540, 1140 410" class="edge"/>
    <!-- review → follow-up open → claim (loop back) -->
    <path d="M 1140 380 C 900 380, 700 300, 480 180" class="edge warm"/>

    <!-- janitor → close → register -->
    <path d="M 1280 130 C 1280 80, 360 80, 100 130" class="edge warm" opacity="0.45"/>
  </g>

  <!-- Nodes -->
  <g class="cond-b fg-0" font-size="13" text-anchor="middle">
    <!-- register -->
    <g transform="translate(100,128)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28">REGISTER</text>
    </g>
    <text x="100" y="190" class="mono fg-3" font-size="10" text-anchor="start" letter-spacing="0.04em">$MADDU_SESSION_ID</text>
    <text x="100" y="202" class="mono fg-3" font-size="10" text-anchor="start" letter-spacing="0.04em">idempotent</text>

    <!-- claim -->
    <g transform="translate(420,128)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28">CLAIM</text>
    </g>

    <!-- work -->
    <g transform="translate(420,288)">
      <rect class="node-rect" width="120" height="64" rx="6"/>
      <text x="60" y="28">WORK</text>
      <text x="60" y="50" class="mono fg-3" font-size="10">heartbeats</text>
    </g>

    <!-- slice-stop -->
    <g transform="translate(420,468)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28">SLICE-STOP</text>
    </g>

    <!-- hindsight -->
    <g transform="translate(780,468)">
      <rect class="node-rect" width="120" height="44" rx="6"/>
      <text x="60" y="28">HINDSIGHT</text>
    </g>

    <!-- memory + skills -->
    <g transform="translate(1140,468)">
      <rect class="node-rect" width="160" height="44" rx="6"/>
      <text x="80" y="28" class="accent">MEMORY · SKILLS</text>
    </g>

    <!-- review (v0.16) -->
    <g transform="translate(1140,358)">
      <rect class="node-rect boss" width="160" height="44" rx="6"/>
      <text x="80" y="28" class="accent2">REVIEW · FOLLOW-UP</text>
    </g>

    <!-- janitor (v0.17) -->
    <g transform="translate(1140,108)">
      <rect class="node-rect warm" width="160" height="44" rx="6"/>
      <text x="80" y="28" class="warm">JANITOR · AUTO-CLOSE</text>
    </g>
  </g>

  <!-- Annotations — small mono notes -->
  <g class="mono fg-3" font-size="10" letter-spacing="0.04em">
    <text x="650" y="478" text-anchor="middle">extracts facts</text>
    <text x="1020" y="478" text-anchor="middle">writes to .maddu/state/memory.ndjson</text>
    <text x="780" y="370" text-anchor="middle">non-clean verdict → FOLLOWUP_OPENED</text>
    <text x="780" y="92" text-anchor="middle">30-min stale → 4-hr auto-close (v0.17, allowlisted)</text>
  </g>

  <!-- Legend strip -->
  <g transform="translate(40,420)">
    <text x="0" y="0" class="cond-b fg-3" font-size="10" letter-spacing="0.10em">LEGEND</text>
    <line x1="0" y1="20" x2="320" y2="20" stroke="rgba(80,113,149,0.18)" stroke-width="1"/>
    <g transform="translate(0,40)">
      <rect width="14" height="2" fill="#D0FF00"/>
      <text x="22" y="6" class="mono fg-3" font-size="11">primary loop</text>
    </g>
    <g transform="translate(150,40)">
      <rect width="14" height="2" fill="#F2BD5C"/>
      <text x="22" y="6" class="mono fg-3" font-size="11">v0.17 surfaces</text>
    </g>
  </g>

  <!-- Tagline -->
  <g transform="translate(700,540)">
    <text x="0" y="0" class="mono fg-3" font-size="10" text-anchor="middle" letter-spacing="0.08em">ONE SLICE · ONE STOP · EVERY ACTION DESCENDS FROM A RECORDED ANCESTOR</text>
  </g>
</svg>
