<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 156" role="img" aria-label="BOSS proposal card — low risk · allowed by Enforcer">
  <title>BOSS · Proposal card · low risk · approved</title>
  <defs>
    <style>
      .canvas { fill: #050B17; }
      .panel { fill: rgba(111,168,162,0.06); stroke: #6FA8A2; stroke-width: 1; }
      .btn-primary { fill: #D0FF00; }
      .btn-ghost   { fill: transparent; stroke: rgba(80,113,149,0.30); stroke-width: 1; }
      .fg-0 { fill: #E8E6E3; }
      .fg-3 { fill: #6a7079; }
      .ok      { fill: #6FA8A2; }
      .cond, .cond-b { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; }
      .cond-b { font-weight: 600; }
      .mono   { font-family: 'IBM Plex Mono','Consolas',monospace; }
    </style>
  </defs>

  <rect class="canvas" width="720" height="156"/>

  <g transform="translate(12,12)">
    <rect width="696" height="132" class="panel" rx="6"/>

    <!-- risk pill / id strip -->
    <text x="14" y="22" class="cond-b ok" font-size="10" letter-spacing="0.14em">PROPOSAL · prop_mp75n059_0t8r · LOW RISK</text>

    <!-- proposal text -->
    <text x="14" y="48" class="cond-b fg-0" font-size="13">claim-lane "cockpit-shell" → ses_20260517_174b16</text>

    <!-- preconditions -->
    <text x="14" y="68" class="mono fg-3" font-size="11">preconditions: lane is free · session is active · holder has heartbeat &lt; 15s</text>

    <!-- Actions row -->
    <g transform="translate(14,86)">
      <rect width="86" height="28" class="btn-primary" rx="3"/>
      <text x="43" y="19" class="cond-b" font-size="11" fill="#050B17" text-anchor="middle" letter-spacing="0.08em">APPROVED</text>

      <rect x="96" y="0" width="68" height="28" class="btn-ghost" rx="3"/>
      <text x="130" y="19" class="cond fg-3" font-size="11" text-anchor="middle">REJECT</text>

      <rect x="172" y="0" width="86" height="28" class="btn-ghost" rx="3"/>
      <text x="215" y="19" class="cond fg-3" font-size="11" text-anchor="middle">NEGOTIATE</text>
    </g>
  </g>
</svg>
