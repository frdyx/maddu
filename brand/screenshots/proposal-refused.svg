<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 168" role="img" aria-label="BOSS proposal refused by Enforcer — cites a hard rule">
  <title>BOSS · Proposal card · refused · Enforcer cites hard-rule slug</title>
  <defs>
    <style>
      .canvas { fill: #050B17; }
      .panel { fill: rgba(255,94,122,0.06); stroke: #FF5E7A; stroke-width: 1; }
      .fg-0 { fill: #E8E6E3; }
      .fg-1 { fill: #B8B2AA; }
      .fg-3 { fill: #6a7079; }
      .danger { fill: #FF5E7A; }
      .warn   { fill: #F2BD5C; }
      .cond, .cond-b { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; }
      .cond-b { font-weight: 600; }
      .mono   { font-family: 'IBM Plex Mono','Consolas',monospace; }
    </style>
  </defs>

  <rect class="canvas" width="720" height="168"/>

  <g transform="translate(12,12)">
    <rect width="696" height="144" class="panel" rx="6"/>

    <!-- risk strip -->
    <text x="14" y="22" class="cond-b danger" font-size="10" letter-spacing="0.14em">PROPOSAL · prop_8h2k0e4q_9w3p · REFUSED BY ENFORCER</text>

    <!-- proposal text -->
    <text x="14" y="48" class="cond-b fg-0" font-size="13">write-file ".maddu/auth/codex-tokens.json"</text>

    <!-- enforcer line -->
    <g transform="translate(14,72)">
      <text x="0" y="0" class="mono warn" font-size="11">⏺</text>
      <text x="18" y="0" class="mono danger" font-size="11" font-weight="600">✗ write_to_auth_dir</text>
    </g>

    <!-- reason -->
    <text x="14" y="98" class="sans fg-1" font-size="12">Writes under .maddu/auth/ are forbidden — that path is OS-owned and</text>
    <text x="14" y="114" class="sans fg-1" font-size="12">contains device-bound credentials.</text>

    <!-- cited rule -->
    <text x="14" y="134" class="mono fg-3" font-size="10">cites: <tspan fill="#56B8FF">docs/hard-rules.md#no-token-export</tspan></text>
  </g>
</svg>
