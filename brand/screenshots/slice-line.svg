<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 48" role="img" aria-label="The signature 900 ms lime line at the top of the cockpit">
  <title>Signature motion · the lime line</title>
  <defs>
    <style>
      .canvas { fill: #050B17; }
      .fg-3 { fill: #6a7079; }
      .cond { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; }
      .mono { font-family: 'IBM Plex Mono','Consolas',monospace; }
    </style>
    <linearGradient id="lime-line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#D0FF00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D0FF00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D0FF00" stop-opacity="0"/>
    </linearGradient>
    <filter id="lime-glow" x="-10%" y="-300%" width="120%" height="700%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect class="canvas" width="720" height="48"/>

  <!-- The line — mid-trace, with a soft glow underneath -->
  <rect x="120" y="22" width="480" height="2" fill="url(#lime-line-gradient)" filter="url(#lime-glow)" opacity="0.6"/>
  <rect x="120" y="22" width="480" height="2" fill="url(#lime-line-gradient)"/>

  <!-- Caption -->
  <text x="360" y="44" class="mono fg-3" font-size="10" text-anchor="middle" letter-spacing="0.10em">~ 900 MS · FIRES ON EVERY SLICE_STOP EVENT</text>
</svg>
