<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 104" role="img" aria-label="Learning route — a single hindsight fact row">
  <title>Learning · Hindsight fact row · rule kind</title>
  <defs>
    <style>
      .canvas { fill: #050B17; }
      .row { fill: #0C1428; stroke: rgba(80,113,149,0.30); stroke-width: 1; }
      .pill-rule { fill: rgba(208,255,0,0.10); stroke: #D0FF00; stroke-width: 0.7; }
      .fg-0 { fill: #E8E6E3; }
      .fg-1 { fill: #B8B2AA; }
      .fg-3 { fill: #6a7079; }
      .fg-4 { fill: #3a3e45; }
      .accent  { fill: #D0FF00; }
      .accent2 { fill: #56B8FF; }
      .cond, .cond-b { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; }
      .cond-b { font-weight: 600; }
      .sans   { font-family: 'IBM Plex Sans','Inter',sans-serif; }
      .mono   { font-family: 'IBM Plex Mono','Consolas',monospace; }
    </style>
  </defs>

  <rect class="canvas" width="640" height="104"/>

  <g transform="translate(12,12)">
    <rect width="616" height="80" class="row" rx="8"/>

    <!-- head row: kind pill + lane + ts -->
    <g transform="translate(14,16)">
      <rect x="0" y="0" width="40" height="16" class="pill-rule" rx="2"/>
      <text x="20" y="11" class="mono accent" font-size="9" text-anchor="middle" letter-spacing="0.08em">RULE</text>

      <text x="50" y="11" class="mono fg-3" font-size="10">cockpit-shell</text>
      <text x="586" y="11" class="mono fg-3" font-size="10" text-anchor="end">14:22 · 3 min ago</text>
    </g>

    <!-- fact text -->
    <text x="26" y="50" class="sans fg-0" font-size="13">every integration must be off by default and refuse to enable until</text>
    <text x="26" y="66" class="sans fg-0" font-size="13">the allowlist is non-empty.</text>

    <!-- tags -->
    <text x="26" y="80" class="mono fg-4" font-size="10">lane:cockpit-shell · actor:ses_20260517 · ext:mjs</text>
  </g>
</svg>
