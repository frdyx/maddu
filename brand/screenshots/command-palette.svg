<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Command palette open with query 'tele'">
  <title>Máddu cockpit — Ctrl+K palette with query "tele"</title>
  <defs>
    <style>
      .canvas    { fill: #050B17; }
      .shell     { fill: #0A1224; }
      .panel     { fill: #0C1428; stroke: rgba(80,113,149,0.30); stroke-width: 1; }
      .panel-d   { fill: #0E1730; stroke: rgba(80,113,149,0.30); stroke-width: 1; }
      .panel-active { fill: #11203C; stroke: #D0FF00; stroke-width: 1; }
      .line-soft { stroke: rgba(80,113,149,0.18); stroke-width: 1; fill: none; }
      .fg-0      { fill: #E8E6E3; }
      .fg-1      { fill: #B8B2AA; }
      .fg-2      { fill: #8A8A8A; }
      .fg-3      { fill: #6a7079; }
      .fg-4      { fill: #3a3e45; }
      .accent    { fill: #D0FF00; }
      .accent2   { fill: #56B8FF; }
      .cond, .cond-b { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; letter-spacing: 0.06em; }
      .cond-b    { font-weight: 600; }
      .mono      { font-family: 'IBM Plex Mono','JetBrains Mono','Consolas',monospace; }
    </style>
  </defs>

  <!-- canvas + scrim (blurred dark backdrop) -->
  <rect class="canvas" width="1200" height="760"/>
  <rect x="0" y="0" width="1200" height="760" fill="#020610" opacity="0.65"/>

  <!-- Faint cockpit ghost behind scrim — suggest there's a cockpit underneath -->
  <g opacity="0.35">
    <rect x="0" y="0" width="64" height="760" fill="#0A1224"/>
    <line x1="64" y1="0" x2="64" y2="760" class="line-soft"/>
    <text x="32" y="40" class="mono fg-4" font-size="14" text-anchor="middle">◆</text>
    <text x="32" y="80" class="mono fg-4" font-size="14" text-anchor="middle">◆</text>
    <text x="32" y="120" class="mono fg-4" font-size="14" text-anchor="middle">◇</text>
    <text x="32" y="160" class="mono fg-4" font-size="14" text-anchor="middle">◇</text>
  </g>

  <!-- Palette panel -->
  <g transform="translate(320,80)">
    <!-- glow accent -->
    <rect x="-3" y="-3" width="566" height="586" fill="rgba(208,255,0,0.04)" rx="12"/>
    <rect width="560" height="580" fill="#0A1224" stroke="rgba(80,113,149,0.50)" stroke-width="1" rx="10"/>

    <!-- head -->
    <line x1="0" y1="56" x2="560" y2="56" class="line-soft"/>
    <text x="22" y="38" class="mono accent" font-size="16">⌕</text>
    <text x="48" y="40" class="cond-b fg-0" font-size="15">tele</text>
    <rect x="44" y="22" width="2" height="24" class="accent">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="500" y="22" width="36" height="20" fill="#0E1730" stroke="rgba(80,113,149,0.30)" rx="3"/>
    <text x="518" y="36" class="mono fg-3" font-size="10" text-anchor="middle">esc</text>

    <!-- Results -->
    <!-- Row 1: Telegram sub-target (ACTIVE) -->
    <g transform="translate(8,68)">
      <rect width="544" height="52" class="panel-active" rx="6"/>
      <text x="14" y="32" class="mono accent" font-size="14" font-weight="600">▸</text>
      <text x="40" y="26" class="cond-b fg-0" font-size="13">TELEGRAM</text>
      <text x="128" y="26" class="mono accent2" font-size="9" opacity="0.85">· in SETTINGS</text>
      <text x="40" y="42" class="mono fg-3" font-size="11">Long-poll bot bridge · allowlisted · off by default · message bodies route via Telegram.</text>
      <text x="528" y="32" class="mono fg-4" font-size="9" text-anchor="end">CONNECT</text>
    </g>

    <!-- Row 2: Discord -->
    <g transform="translate(8,128)">
      <rect width="544" height="52" class="panel-d" rx="6"/>
      <text x="14" y="32" class="mono fg-3" font-size="14">▸</text>
      <text x="40" y="26" class="cond fg-1" font-size="13">DISCORD</text>
      <text x="128" y="26" class="mono fg-3" font-size="9">· in SETTINGS</text>
      <text x="40" y="42" class="mono fg-3" font-size="11">Outbound-only REST (no gateway) · channel allowlist · @everyone blocked.</text>
      <text x="528" y="32" class="mono fg-4" font-size="9" text-anchor="end">CONNECT</text>
    </g>

    <!-- Row 3: Email -->
    <g transform="translate(8,188)">
      <rect width="544" height="52" class="panel-d" rx="6"/>
      <text x="14" y="32" class="mono fg-3" font-size="14">▸</text>
      <text x="40" y="26" class="cond fg-1" font-size="13">EMAIL</text>
      <text x="128" y="26" class="mono fg-3" font-size="9">· in SETTINGS</text>
      <text x="40" y="42" class="mono fg-3" font-size="11">Outbound-only SMTP · TLS required (port 465/587) · recipient allowlist.</text>
      <text x="528" y="32" class="mono fg-4" font-size="9" text-anchor="end">CONNECT</text>
    </g>

    <!-- Row 4: Settings route -->
    <g transform="translate(8,248)">
      <rect width="544" height="52" class="panel-d" rx="6"/>
      <text x="14" y="32" class="mono fg-3" font-size="14">◇</text>
      <text x="40" y="26" class="cond fg-1" font-size="13">SETTINGS</text>
      <text x="40" y="42" class="mono fg-3" font-size="11">Bridge, lanes, providers, tokens, integrations, MCP registry.</text>
      <text x="528" y="32" class="mono fg-4" font-size="9" text-anchor="end">CONNECT</text>
    </g>

    <!-- Row 5: Action — Open the 5-minute tour -->
    <g transform="translate(8,308)">
      <rect width="544" height="52" class="panel-d" rx="6"/>
      <text x="14" y="32" class="mono accent2" font-size="14" font-weight="600">▷</text>
      <text x="40" y="26" class="cond fg-1" font-size="13">OPEN THE FIVE-MINUTE TOUR</text>
      <text x="240" y="26" class="mono accent2" font-size="9" opacity="0.85">· action</text>
      <text x="40" y="42" class="mono fg-3" font-size="11">First-time walkthrough: register, claim, slice-stop, watch the lime line.</text>
      <text x="528" y="32" class="mono fg-4" font-size="9" text-anchor="end">REFERENCE</text>
    </g>

    <!-- Row 6 -->
    <g transform="translate(8,368)">
      <rect width="544" height="52" class="panel-d" rx="6"/>
      <text x="14" y="32" class="mono fg-3" font-size="14">◇</text>
      <text x="40" y="26" class="cond fg-1" font-size="13">DOCS</text>
      <text x="40" y="42" class="mono fg-3" font-size="11">End-user manual. Install, concepts, CLI, cockpit tour, troubleshooting.</text>
      <text x="528" y="32" class="mono fg-4" font-size="9" text-anchor="end">REFERENCE</text>
    </g>

    <!-- foot -->
    <line x1="0" y1="540" x2="560" y2="540" class="line-soft"/>
    <g transform="translate(20,558)">
      <rect x="0" y="0" width="14" height="14" fill="#0E1730" stroke="rgba(80,113,149,0.30)" rx="2"/>
      <text x="7" y="11" class="mono fg-3" font-size="9" text-anchor="middle">↑</text>
      <rect x="18" y="0" width="14" height="14" fill="#0E1730" stroke="rgba(80,113,149,0.30)" rx="2"/>
      <text x="25" y="11" class="mono fg-3" font-size="9" text-anchor="middle">↓</text>
      <text x="42" y="11" class="mono fg-3" font-size="10">navigate</text>
      <rect x="116" y="0" width="14" height="14" fill="#0E1730" stroke="rgba(80,113,149,0.30)" rx="2"/>
      <text x="123" y="11" class="mono fg-3" font-size="9" text-anchor="middle">↵</text>
      <text x="138" y="11" class="mono fg-3" font-size="10">open</text>
      <text x="520" y="11" class="mono fg-1" font-size="10" text-anchor="end">→ Telegram</text>
    </g>
  </g>

  <!-- Caption at bottom -->
  <g transform="translate(600,700)">
    <text x="0" y="0" class="cond fg-3" font-size="11" text-anchor="middle" letter-spacing="0.10em">Ctrl + K · ⌘ K — fuzzy across routes · sub-targets · actions</text>
  </g>
</svg>
