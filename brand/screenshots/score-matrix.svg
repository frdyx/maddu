<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 808 248" role="img" aria-label="Conductor operation score matrix — per-lane progress bars">
  <title>Conductor · Operation Score Matrix</title>
  <defs>
    <style>
      .canvas { fill: #050B17; }
      .panel { fill: #0C1428; stroke: rgba(80,113,149,0.30); stroke-width: 1; }
      .track  { fill: #10182A; }
      .line-soft { stroke: rgba(80,113,149,0.18); stroke-width: 1; fill: none; }
      .fg-0 { fill: #E8E6E3; }
      .fg-1 { fill: #B8B2AA; }
      .fg-3 { fill: #6a7079; }
      .fg-4 { fill: #3a3e45; }
      .accent  { fill: #D0FF00; }
      .accent2 { fill: #56B8FF; }
      .warn    { fill: #F2BD5C; }
      .ok      { fill: #6FA8A2; }
      .cond, .cond-b { font-family: 'IBM Plex Sans Condensed','Inter','Helvetica Neue',sans-serif; }
      .cond-b { font-weight: 600; }
      .mono   { font-family: 'IBM Plex Mono','Consolas',monospace; }
    </style>
  </defs>

  <rect class="canvas" width="808" height="248"/>

  <g transform="translate(16,16)">
    <rect width="776" height="216" class="panel" rx="6"/>
    <text x="20" y="28" class="cond-b fg-0" font-size="13" letter-spacing="0.05em">OPERATION SCORE MATRIX</text>
    <text x="756" y="28" class="mono fg-3" font-size="10" text-anchor="end">per-lane progress · reason codes</text>
    <line x1="20" y1="42" x2="756" y2="42" class="line-soft"/>

    <!-- Row 1: accent (high progress) -->
    <g transform="translate(20,60)">
      <text x="0" y="12" class="cond fg-1" font-size="12">cockpit-shell</text>
      <rect x="160" y="2" width="540" height="14" class="track" rx="2"/>
      <rect x="160" y="2" width="470" height="14" class="accent" rx="2"/>
      <text x="744" y="14" class="mono fg-1" font-size="11" text-anchor="end">87%</text>
      <text x="0" y="30" class="mono fg-4" font-size="10">claim_healthy</text>
    </g>

    <!-- Row 2: ok -->
    <g transform="translate(20,110)">
      <text x="0" y="12" class="cond fg-1" font-size="12">harness</text>
      <rect x="160" y="2" width="540" height="14" class="track" rx="2"/>
      <rect x="160" y="2" width="346" height="14" class="ok" rx="2"/>
      <text x="744" y="14" class="mono fg-1" font-size="11" text-anchor="end">64%</text>
      <text x="0" y="30" class="mono fg-4" font-size="10">progressing</text>
    </g>

    <!-- Row 3: warn (parked) -->
    <g transform="translate(20,160)">
      <text x="0" y="12" class="cond fg-1" font-size="12">architecture</text>
      <rect x="160" y="2" width="540" height="14" class="track" rx="2"/>
      <rect x="160" y="2" width="108" height="14" class="warn" rx="2"/>
      <text x="744" y="14" class="mono fg-1" font-size="11" text-anchor="end">20%</text>
      <text x="0" y="30" class="mono fg-4" font-size="10">queue_head_ready · waiting for dispatch</text>
    </g>
  </g>
</svg>
